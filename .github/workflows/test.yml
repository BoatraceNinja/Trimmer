name: test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test:
    name: PHPUnit ${{ matrix.phpunit-version }} on PHP ${{ matrix.php-version }} (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version:
          - '8.3'
          - '8.4'
          - '8.5'
        phpunit-version:
          - '12.5.22'
          - '13.1.6'
        dependency-version:
          - prefer-lowest
          - prefer-stable
        exclude:
          - php-version: '8.3'
            phpunit-version: '13.1.6'
    steps:
      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: composer update --${{ matrix.dependency-version }} --no-interaction --no-progress --with="phpunit/phpunit:${{ matrix.phpunit-version }}"

      - name: Run PHP_CodeSniffer
        run: vendor/bin/phpcs --standard=phpcs.xml.dist

      - name: Run PHPUnit ${{ matrix.phpunit-version }}
        run: vendor/bin/phpunit --configuration=phpunit.xml.dist --no-progress
